<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Neue Reservierung</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input, select, textarea { display: block; margin: 8px 0; padding: 6px; width: 300px; }
    </style>
</head>
<body>

<h1>Neue Reservierung</h1>

<form method="post" th:action="@{/reservations/save}" th:object="${reservation}">

    <label>Patient:</label>
    <select th:field="*{patient.svn}">
        <option th:each="p : ${patients}" th:value="${p.svn}"
                th:text="${p.firstName} + ' ' + ${p.lastName}"></option>
    </select>

    <label>Gerät:</label>
    <select th:field="*{device.designation}">
        <option th:each="d : ${devices}"
                th:value="${d.designation}"
                th:text="${d.designation} + ' - ' + ${d.type}">
        </option>
    </select>

    <label>Untersuchungszeit:</label>
    <input type="datetime-local" th:field="*{reservationTime}">

    <label>Körperregion:</label>
    <select th:field="*{bodyRegion}">
        <option value="Kopf">Kopf</option>
        <option value="Hals">Hals</option>
        <option value="Brust">Brust</option>
        <option value="Bauch">Bauch</option>
        <option value="Wirbelsäule">Wirbelsäule</option>
        <option value="Becken">Becken</option>
        <option value="Arm">Arm</option>
        <option value="Bein">Bein</option>
    </select>

    <label>Kommentar:</label>
    <textarea th:field="*{comment}" rows="3"></textarea>

    <br>
    <button type="submit">Speichern</button>
</form>

<br>
<a href="/patient">Neuen Patienten registrieren</a>

</body>
</html>
